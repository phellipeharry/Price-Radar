<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar de Preços</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="brand">
        <img src="icon48.png" alt="Radar de Preços Logo" class="brand-logo">
        <div class="brand-text">
          <h1>Radar de Preços</h1>
          <p class="status-indicator"><span class="status-dot"></span> Monitor ativo</p>
        </div>
      </div>
    </header>

    <!-- Main CTA -->
    <div class="cta-section">
      <button id="track-btn" class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="btn-icon">
          <path d="M12 4.5a7.5 7.5 0 1 0 0 15 7.5 7.5 0 0 0 0-15zM1.5 12a10.5 10.5 0 1 1 21 0 10.5 10.5 0 0 1-21 0z" />
          <path d="M12 7.5a.75.75 0 0 1 .75.75v3h3a.75.75 0 0 1 0 1.5h-3v3a.75.75 0 0 1-1.5 0v-3h-3a.75.75 0 0 1 0-1.5h3v-3A.75.75 0 0 1 12 7.5z" />
        </svg>
        Monitorar Preço Nesta Página
      </button>
    </div>

    <!-- Products List Section -->
    <main class="main-content">
      <div class="section-title">
        <h2>Produtos Rastreados (<span id="products-count">0</span>)</h2>
        <button id="refresh-all-btn" class="btn-icon-only" title="Atualizar todos os preços">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-refresh-cw">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
        </button>
      </div>

      <!-- Scrollable list of products -->
      <div id="products-list" class="products-list">
        <!-- Empty state default -->
        <div id="empty-state" class="empty-state">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="empty-icon">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <p>Nenhum produto monitorado ainda.</p>
          <p class="empty-hint">Navegue até um produto e clique no botão acima para começar a rastrear!</p>
        </div>
      </div>
    </main>

    <!-- Settings and Footer -->
    <footer class="app-footer">
      <div class="footer-row">
        <label for="interval-select" class="settings-label">Verificar a cada:</label>
        <select id="interval-select" class="select-input">
          <option value="15">15 Minutos</option>
          <option value="30">30 Minutos</option>
          <option value="60" selected>1 Hora</option>
          <option value="240">4 Horas</option>
          <option value="720">12 Horas</option>
          <option value="1440">24 Horas</option>
        </select>
      </div>
      <div class="footer-credits">
        <span>Radar de Preços v1.0</span>
      </div>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
